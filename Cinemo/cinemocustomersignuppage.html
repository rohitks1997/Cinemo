<!DOCTYPE html>
<html>
<title>Cinemo</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
<link rel="stylesheet" href="cinemocustomersignuppage.css">
<body>
<style>

input[type=text], input[type=password] {
  width: 140%;
  padding: 12px 20px;
  margin: 12px 0;
  display: inline-block;
  border: 1px solid black;
  box-sizing: border-box;
}

button {
  background-color: black;
  color: white;
  padding: 14px 20px;
  margin: 8px 0;
  border: none;
  cursor: pointer;
  width: 100%;
  max-width: 200px;
}

button:hover {
  opacity: 0.8;
}

.imgcontainer {
  text-align: center;
  margin: 24px 0 12px 0;
}

img.avatar {
  width: 40%;
}

span.psw {
  float: center;
  padding-top: 16px;
}

/* Change styles for span and cancel button on extra small screens */
@media screen and (max-width: 300px) {
  span.psw {
     display: block;
     float: none;
  }
}
</style>
</head>
<body>

<form action="/action_page.php" method="post">
  <div class="imgcontainer">
    <img src="images/Cinemo Logo.JPG" alt="Avatar" class="avatar">
  </div>

  <div class="container">
    <label for="name"><b>Full Name</b></label>
    <input type="text" placeholder="Enter Name" name="name" required>

    <label for="dob"><b>Date of Birth</b></label>
    <input type="date" id="birthday" name="birthday" required>

    <label for="uname"><b>Username</b></label>
    <input type="text" placeholder="Enter Username" name="uname" required>

    <label for="psw"><b>Password</b></label>
    <input type="password" placeholder="Enter Password" name="psw" required>
        
    <button onclick="document.location='cinemohomepage.html'">Sign Up</button>
    <span>Created an account ?<a href="cinemosigninpagecustomer.html">Sign In</a></span>

    <a href="cinemosigninpagetheaterstaff.html">Theater Staff</a>
    <a href="cinemosigninpageowner.html">Owner</a>
    
  </div>

</form>

</body>
</html>
